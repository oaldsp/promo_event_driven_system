services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" # Interface web (dashboard)
      #http://localhost:15672 user: guest pass: guest

  gateway:
    build:
      context: .
      args:
        SERVICE_NAME: gateway
    container_name: gateway
    command: python  micro_services/gateway.py
    depends_on:
      - rabbitmq

  promotion:
    build:
      context: .
      args:
        SERVICE_NAME: promotion
    container_name: promotion
    command: python  micro_services/promotion.py
    depends_on:
      - rabbitmq

  ranking:
    build:
      context: .
      args:
        SERVICE_NAME: ranking
    container_name: ranking
    command: python  micro_services/ranking.py
    depends_on:
      - rabbitmq

  notification:
    build:
      context: .
      args:
        SERVICE_NAME: notification
    container_name: notification
    command: python  micro_services/notification.py
    depends_on:
      - rabbitmq

  client1:
    build:
      context: .
      args:
        SERVICE_NAME: client1
    container_name: client1
    command: python  client.py
    depends_on:
      - rabbitmq

  client2:
    build:
      context: .
      args:
        SERVICE_NAME: client2
    container_name: client2
    command: python  client.py
    depends_on:
      - rabbitmq