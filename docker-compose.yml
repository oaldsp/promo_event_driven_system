services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: promo-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway
    container_name: promo-gateway
    command: python -m uvicorn gateway_service:app --app-dir micro_services --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      RABBITMQ_HOST: rabbitmq
    volumes:
      - ./micro_services/public_keys:/gateway/micro_services/public_keys
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq

  promotion:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: promotion
    container_name: promo-promotion
    command: python -u micro_services/promotion_service.py
    env_file:
      - .env
    environment:
      RABBITMQ_HOST: rabbitmq
    volumes:
      - ./micro_services/public_keys:/promotion/micro_services/public_keys
    depends_on:
      - rabbitmq

  ranking:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: ranking
    container_name: promo-ranking
    command: python -u micro_services/ranking_service.py
    env_file:
      - .env
    environment:
      RABBITMQ_HOST: rabbitmq
    volumes:
      - ./micro_services/public_keys:/ranking/micro_services/public_keys
    depends_on:
      - rabbitmq

  notification:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification
    container_name: promo-notification
    command: python -u micro_services/notification_service.py
    env_file:
      - .env
    environment:
      RABBITMQ_HOST: rabbitmq
    volumes:
      - ./micro_services/public_keys:/notification/micro_services/public_keys
    depends_on:
      - rabbitmq

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: promo-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - gateway
