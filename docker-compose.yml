services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "15672:15672" # Interface web (dashboard)
      #http://localhost:15672 user: guest pass: guest

  gateway:
    build:
      context: .
      args:
        SERVICE_NAME: gateway
    env_file:
      - .env
    container_name: gateway
    command: sleep infinity
    depends_on:
      - rabbitmq

  promotion:
    build:
      context: .
      args:
        SERVICE_NAME: promotion
    env_file:
      - .env
    container_name: promotion
    command: python -u micro_services/promotion_service.py
    depends_on:
      - rabbitmq

  ranking:
    build:
      context: .
      args:
        SERVICE_NAME: ranking
    env_file:
      - .env
    container_name: ranking
    command: python -u micro_services/ranking_service.py
    depends_on:
      - rabbitmq

  notification:
    build:
      context: .
      args:
        SERVICE_NAME: notification
    env_file:
      - .env
    container_name: notification
    command: python -u micro_services/notification_service.py
    depends_on:
      - rabbitmq

  client1:
    build:
      context: .
      args:
        SERVICE_NAME: client1
    env_file:
      - .env
    environment:
      CLIENT_ID: 1
      ROUTING_KEYS: '["promotion.hot_deal", "promotion.teste1"]'
    container_name: client1
    command: python -u client.py
    depends_on:
      - rabbitmq

  client2:
    build:
      context: .
      args:
        SERVICE_NAME: client2
    env_file:
      - .env
    environment:
      CLIENT_ID: 2
      ROUTING_KEYS: '["promotion.hot_deal", "promotion.teste2"]'
    container_name: client2
    command: python -u client.py
    depends_on:
      - rabbitmq